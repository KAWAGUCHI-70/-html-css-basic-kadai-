<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="description" content="Myprofile">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Noto+Sans+JP&display=swap" rel="stylesheet">
  </head>

  <body>
    <!-- ヘッダー -->
    <header>
      <!-- ナビゲーション 設定 -->
      <div class="header-inner">
        <h1>
          <a href="index.html" class="Prof-top">My Profile</a>
        </h1>  
        <nav>    
            <ul class="nav-menu">
              <li><a href="index.html#about">About</a></li>
              <li><a href="index.html#works">Works</a></li>
            </ul>        
        </nav>
      </div>
    </header>
    <!-- メイン -->
   <main>
    <article>
      <section id="main-image">
        <img src="images/main.png" alt="カメラのイメージ">
      </section>
      <!-- About -->
      <section id="about">
        <h2>About</h2>
        <div class="about-main">
          <img src="images/about.png" alt="Kazuki Asahinaの写真" class="icon">
         <div class="about-prof">
          <p class="name">Kazuki Asahina</p>
            <ul>
              <li><p>25歳 長野県佐久市出身</p></li>
              <li><p>ソフトウェア業界でマーケティングに従事</p></li>
              <li><p>趣味はカメラ、愛機はCanon</p></li>
              <li><p>自然を撮影するのが好きで、海や山によく行く</p></li>
            </ul>
          </div>
        </div>
      </section>

      <!-- work -->
       <section id="works">
        <div class="works-main">
          <h2>Works</h2>
          <div class="works-inner">
            <div class="item">
              <img src="images/works1.png" alt="新潟の写真">
              <p>新潟に訪れた際に、日本海の雄大さを魅了されて撮影した1枚</p>
            </div>
            <div class="item">
              <img src="images/works2.png" alt="木曽の御嶽山">
              <p>地元長野の木曽町から撮影した、冠雪した御嶽山</p>
            </div>
            <div class="item">
              <img src="images/works3.png" alt="京都の街並み">
              <p>京都で撮影した、明け方の古き良き日本の街並み</p>
            </div>
          </div>
        </div>
       </section>
    </article>
   </main>

   <footer>
    <p id="copyright">&copy;MyProfile. All rights reserved.</p>
   </footer>

  </body>
</html>
